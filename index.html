<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="container">
      <div class="button-box">
        <input
          type="button"
          value="Rock"
          id="rock"
          onclick="buttonClicked(this.value)"
        />
        <input
          type="button"
          value="Paper"
          id="paper"
          onclick="buttonClicked(this.value)"
        />
        <input
          type="button"
          value="Scissors"
          id="scissors"
          onclick="buttonClicked(this.value)"
        />
      </div>
      <div class="result-box">
        <div class="choice-icons">
          <img
            src="./assets/Rock.png"
            alt="fist icon"
            class="icon"
            id="human-choice"
          />
          <h2>VS.</h2>
          <img
            src="./assets/Rock.png"
            alt="fist icon"
            class="icon"
            id="bot-choice"
          />
        </div>
        <h3 id="round-winner">No rounds played</h3>
      </div>
      <div class="score-box">
        <h2 id="player-score">Player: 0</h2>
        <h2 id="bot-score">Bot: 0</h2>
        <h1 id="final-score">First to 5 wins</h1>
        <button id="reset-button">Reset</button>
      </div>

      <div class="footer">
        <img src="./assets/logo.svg" alt="The Odin Project logo" />
        <ul>
          <li>
            <a
              href="https://www.flaticon.com/free-icons/fist"
              title="fist icons"
              >Fist icons created by Cap Cool - Flaticon</a
            >
          </li>
          <li>
            <a
              href="https://www.flaticon.com/free-icons/on-hold"
              title="on hold icons"
              >On hold icons created by Cap Cool - Flaticon</a
            >
          </li>
          <li>
            <a
              href="https://www.flaticon.com/free-icons/rock-paper-scissors"
              title="rock paper scissors icons"
              >Rock paper scissors icons created by Cap Cool - Flaticon</a
            >
          </li>
        </ul>
      </div>
    </div>

    <script>
      let yourChoice;
      let computerChoice;

      let humanScore = 0;
      let computerScore = 0;

      const p1ChoiceElement = document.getElementById("human-choice");
      const botChoiceElement = document.getElementById("bot-choice");
      const roundWinnerElement = document.getElementById("round-winner");
      const playerScoreElement = document.getElementById("player-score");
      const botScoreElement = document.getElementById("bot-score");
      const finalScoreElement = document.getElementById("final-score");

      function getComputerChoice() {
        let randomNum = Math.floor(Math.random() * 3);
        switch (randomNum) {
          case 0:
            return (computerChoice = "Rock");
            break;
          case 1:
            return (computerChoice = "Paper");
            break;
          case 2:
            return (computerChoice = "Scissors");
            break;
          default:
            console.log("something went wrong.");
        }
      }

      function checkIfOver() {
        if (computerScore === 5) {
          rock.toggleAttribute("disabled");
          paper.toggleAttribute("disabled");
          scissors.toggleAttribute("disabled");
          finalScoreElement.textContent = `Bot wins the game ${computerScore} to ${humanScore}`;
          resetButton.textContent = "Play again?";
        } else if (humanScore === 5) {
          rock.toggleAttribute("disabled");
          paper.toggleAttribute("disabled");
          scissors.toggleAttribute("disabled");
          finalScoreElement.textContent = `You won the game ${humanScore} to ${computerScore}`;
          resetButton.textContent = "Play again?";
        } else {
          return;
        }
      }

      function playRound(computer, human) {
        if (computer === human) {
          roundWinnerElement.textContent = "It's a draw.";
          return;
        } else if (human === "Rock") {
          if (computer === "Paper") {
            computerScore++;
            botScoreElement.textContent = `Bot: ${computerScore}`;
            roundWinnerElement.textContent = `Bot wins the round.`;
            checkIfOver();
            return;
          } else {
            humanScore++;
            playerScoreElement.textContent = `Player: ${humanScore}`;
            roundWinnerElement.textContent = "You win the round.";
            checkIfOver();
            return;
          }
        } else if (human === "Paper") {
          if (computer === "Scissors") {
            computerScore++;
            botScoreElement.textContent = `Bot: ${computerScore}`;
            roundWinnerElement.textContent = `Bot wins the round`;
            checkIfOver();
            return;
          } else {
            humanScore++;
            playerScoreElement.textContent = `Player: ${humanScore}`;
            roundWinnerElement.textContent = "You win the round.";
            checkIfOver();
            return;
          }
        } else {
          if (computer === "Rock") {
            computerScore++;
            botScoreElement.textContent = `Bot: ${computerScore}`;
            roundWinnerElement.textContent = `Bot wins the round`;
            checkIfOver();
            return;
          } else {
            humanScore++;
            playerScoreElement.textContent = `Player: ${humanScore}`;
            roundWinnerElement.textContent = "You win the round.";
            checkIfOver();
            return;
          }
        }
      }

      function resetGame() {
        if (computerScore === 5 || humanScore === 5) {
          rock.toggleAttribute("disabled");
          paper.toggleAttribute("disabled");
          scissors.toggleAttribute("disabled");
        }
        yourChoice = "";
        computerChoice = "";
        computerScore = 0;
        humanScore = 0;
        botScoreElement.textContent = "Bot: 0";
        playerScoreElement.textContent = "Player: 0";
        roundWinnerElement.textContent = "No rounds played";
        finalScoreElement.textContent = "First to 5 wins";
        resetButton.textContent = "Reset";

        return;
      }

      function buttonClicked(choice) {
        getComputerChoice();
        yourChoice = choice;
        p1ChoiceElement.setAttribute("src", `./assets/${yourChoice}.png`);
        botChoiceElement.setAttribute("src", `./assets/${computerChoice}.png`);
        playRound(computerChoice, yourChoice);
      }

      const resetButton = document.getElementById("reset-button");
      resetButton.addEventListener("click", () => resetGame());
    </script>
  </body>
</html>
